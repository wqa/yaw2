<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YAW/2 — web client (spike)</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: #0e1014; color: #d8dce2;
      display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
    aside { border-right: 1px solid #262b33; padding: 1rem; overflow-y: auto; }
    main { display: flex; flex-direction: column; min-width: 0; }
    h1 { font-size: 1.3rem; margin: 0 0 .2rem; }
    h3 { font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; color: #8b94a3; margin: 1.2rem 0 .4rem; }
    input, button { font: inherit; color: #e6e8ec; background: #1c1f24; border: 1px solid #2b313a;
      border-radius: 6px; padding: .4rem .5rem; }
    input { width: 100%; margin-bottom: .4rem; }
    button { cursor: pointer; background: #2c3038; }
    button.primary { background: #4a9d6f; border-color: #4a9d6f; color: #06120b; font-weight: 600; width: 100%; }
    .mono { font-family: ui-monospace, monospace; }
    .muted { color: #8b94a3; }
    .peer { padding: .3rem .4rem; border-radius: 6px; }
    .badge { font-size: .68rem; padding: .05rem .4rem; border-radius: 999px; margin-left: .3rem; }
    .ok { background: rgba(74,157,111,.2); color: #6fce96; } .warn { background: rgba(192,138,0,.2); color: #e0b341; }
    .log { flex: 1; overflow-y: auto; padding: 1rem; }
    .line { margin: .15rem 0; }
    .line.sys { color: #8b94a3; font-size: .85rem; } .line.mine { color: #5a8fd6; } .line.file { color: #6fce96; }
    .composer { display: flex; gap: .5rem; padding: .8rem; border-top: 1px solid #262b33; }
    .composer input { margin: 0; }
    a { color: #6fce96; }
  </style>
</head>
<body>
  <aside>
    <h1>YAW/2 <span class="muted" style="font-size:.7rem">spike</span></h1>
    <div id="me" class="mono muted" style="font-size:.75rem; word-break:break-all"></div>

    <h3>Join</h3>
    <input id="url" placeholder="signaling URL" />
    <input id="net" placeholder="network name" />
    <button id="join" class="primary">Connect</button>
    <button id="diag">Test my connectivity</button>

    <h3>You</h3>
    <input id="nick" placeholder="your nickname" />
    <button id="setnick">Set nickname</button>
    <div id="mycard" class="mono" style="font-size:.64rem; word-break:break-all; cursor:pointer" title="click to copy your contact card"></div>

    <h3>Trust</h3>
    <input id="acceptid" placeholder="paste a friend's card (or id)" />
    <input id="acceptnick" placeholder="nickname for them (optional)" />
    <button id="accept">Accept</button>
    <div id="keys" class="muted" style="font-size:.72rem; margin-top:.4rem"></div>
    <div style="margin-top:.4rem">
      <button id="expcontacts">Export contacts</button>
      <button id="impcontacts">Import contacts</button>
      <input id="contactsfile" type="file" accept=".yawcontacts,.json,application/json" style="display:none" />
    </div>
    <div style="margin-top:.5rem">
      <button id="backupkey">Back up key</button>
      <button id="restorekey">Restore key</button>
      <input id="keyfile" type="file" accept=".yawkey,.json,application/json" style="display:none" />
    </div>
    <div id="keynote" class="muted" style="font-size:.68rem; margin-top:.3rem">Your key lives in this browser. Back it up — clearing site data erases it.</div>

    <h3>Peers <span id="pcount" class="muted"></span></h3>
    <div id="peers"></div>

    <h3>Files</h3>
    <input id="file" type="file" multiple />
    <button id="addshare">Add to my share</button>
    <button id="sendfile">Send now to all</button>
    <div id="sharecount" class="muted" style="font-size:.78rem; margin-top:.3rem"></div>
  </aside>

  <main>
    <div id="log" class="log"></div>
    <form id="composer" class="composer">
      <input id="msg" placeholder="message…" autocomplete="off" style="flex:1" />
      <button type="submit">Send</button>
    </form>
  </main>

  <script src="config.js"></script><!-- deployment config (gitignored); see config.example.js -->
  <script src="vendor/sodium.bundle.js"></script>
  <script src="yaw2.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const log = $('log');
    function line(cls, html) {
      const d = document.createElement('div'); d.className = 'line ' + cls; d.innerHTML = html;
      log.appendChild(d); log.scrollTop = log.scrollHeight;
    }
    const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
    const short = (id) => esc((id || '').slice(0, 12)) + '…';

    // In-page prompt — window.prompt() is a no-op inside the Tauri webview.
    // Resolves to the entered string, or null on cancel. Works in browser + Tauri.
    function askText(message, opts = {}) {
      return new Promise((resolve) => {
        const ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000';
        const box = document.createElement('div');
        box.style.cssText = 'background:#1c1f24;border:1px solid #2b313a;border-radius:10px;padding:1rem;width:min(420px,92vw);display:flex;flex-direction:column;gap:.6rem';
        const lbl = document.createElement('div'); lbl.textContent = message; lbl.style.fontSize = '.9rem';
        const inp = document.createElement('input');
        inp.type = opts.password ? 'password' : 'text';
        inp.value = opts.value || '';
        inp.style.cssText = 'width:100%;margin:0;padding:.45rem .5rem;background:#0e1014;border:1px solid #2b313a;border-radius:6px;color:#e6e8ec';
        const rowb = document.createElement('div'); rowb.style.cssText = 'display:flex;gap:.5rem;justify-content:flex-end';
        const cancel = document.createElement('button'); cancel.textContent = 'Cancel';
        const ok = document.createElement('button'); ok.textContent = 'OK'; ok.className = 'primary'; ok.style.width = 'auto';
        rowb.append(cancel, ok); box.append(lbl, inp, rowb); ov.append(box); document.body.append(ov);
        inp.focus(); inp.select();
        const done = (v) => { ov.remove(); resolve(v); };
        cancel.onclick = () => done(null);
        ok.onclick = () => done(inp.value);
        inp.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); done(inp.value); } else if (e.key === 'Escape') done(null); };
        ov.onclick = (e) => { if (e.target === ov) done(null); };
      });
    }

    // Deployment defaults come from config.js (gitignored), never the repo.
    (() => {
      const c = window.YAW_CONFIG || {};
      if (c.signalURL && !$('url').value) $('url').value = c.signalURL;
      if (c.defaultNet && !$('net').value) $('net').value = c.defaultNet;
      if (YAW.inTauri) $('keynote').textContent =
        'Your key is in the OS keychain — it survives clearing app data. A passphrase backup is still wise.';
    })();

    let node = null, ident = null;
    const untrusted = new Set();
    const label = (id) => { const n = node && node.keyring.name(id); return n ? esc(n) : short(id); };
    const myNick = () => node ? node.nick : YAW.cleanNick(localStorage.getItem('yaw2_nick') || '');

    function refreshMe() {
      if (!ident) return;
      const card = YAW.makeCard(ident.id, myNick());
      $('mycard').textContent = card;
      $('mycard').onclick = () => { navigator.clipboard?.writeText(card); line('sys', 'contact card copied to clipboard'); };
      if (!$('nick').value) $('nick').value = myNick();
      $('me').textContent = 'you: ' + (myNick() || ident.short);
    }

    function refreshKeys() {
      if (!node) return;
      const entries = node.keyring.entries();
      $('keys').innerHTML = '';
      if (!entries.length) { $('keys').textContent = 'trusting nobody yet'; return; }
      $('keys').appendChild(document.createTextNode(`trusting ${entries.length}:`));
      for (const [id, nk] of entries) {
        const row = document.createElement('div');
        row.style.cssText = 'cursor:pointer'; row.title = 'click to rename';
        row.textContent = '  ' + (nk || '(no nick)') + ' · ' + id.slice(0, 8) + '…';
        row.onclick = async () => { const nn = await askText('Nickname for ' + id.slice(0, 12) + '…', { value: nk }); if (nn !== null) { node.keyring.rename(id, nn); refreshKeys(); refreshPeers(); } };
        $('keys').appendChild(row);
      }
    }

    function refreshPeers() {
      const peers = node ? Object.values(node.peers) : [];
      $('pcount').textContent = peers.length ? `(${peers.length})` : '';
      $('peers').innerHTML = '';
      for (const p of peers) {
        const d = document.createElement('div'); d.className = 'peer mono';
        const st = p.pc.connectionState;
        const badge = p.verified ? '<span class="badge ok">verified</span>'
          : (st === 'failed' || st === 'disconnected') ? '<span class="badge warn">failed</span>'
          : (st === 'connected') ? '<span class="badge ok">connected</span>'
          : `<span class="badge warn">${st}…</span>`;
        d.innerHTML = label(p.peerId) + badge;
        if (p.verified) {
          const b = document.createElement('button');
          b.textContent = 'browse'; b.style.cssText = 'font-size:.7rem;margin-left:.4rem;padding:.05rem .4rem';
          b.onclick = () => p.requestBrowse();
          d.appendChild(b);
        }
        $('peers').appendChild(d);
      }
    }

    function onEvent(kind, kw) {
      if (kind === 'connected') {
        const hint = (!(node && node.keyring.name(kw.peer)) && kw.nick) ? ` (calls itself “${esc(kw.nick)}”)` : '';
        const fs = kw.fs ? ' 🔒 forward-secret' : ' (not forward-secret)';
        line('sys', `+ ${label(kw.peer)} connected ${kw.verified ? '(identity verified ✓)' : '(UNVERIFIED!)'}${fs}${hint}`); refreshPeers();
      }
      else if (kind === 'untrusted') {
        if (untrusted.has(kw.peer)) return; untrusted.add(kw.peer);
        const d = document.createElement('div'); d.className = 'line sys';
        d.innerHTML = `someone wants to connect — not in your keyring. `;
        const b = document.createElement('button'); b.textContent = 'accept';
        b.style.cssText = 'font-size:.7rem;padding:.05rem .4rem';
        b.onclick = async () => {
          const nn = await askText('Nickname for this contact (optional):', { value: kw.nick || '' });
          try { await node.accept(kw.peer, nn || ''); untrusted.delete(kw.peer); refreshKeys(); line('sys', `accepted ${label(kw.peer)} — connecting…`); }
          catch (e) { line('sys', 'error: ' + esc(e.message)); }
        };
        d.appendChild(b);
        const c = document.createElement('div'); c.className = 'mono muted'; c.style.cssText = 'font-size:.6rem;word-break:break-all'; c.textContent = kw.peer;
        d.appendChild(c); log.appendChild(d); log.scrollTop = log.scrollHeight;
      }
      else if (kind === 'status') {
        refreshPeers();
        if (kw.state === 'failed') line('sys', `could not connect to ${label(kw.peer)} — likely a restrictive NAT; try another network for one side.`);
      }
      else if (kind === 'signaling') { line('sys', `signaling ${kw.state} (${kw.peers} peer(s) present)`); refreshPeers(); }
      else if (kind === 'peer-leave') { line('sys', `- ${label(kw.peer)} left`); refreshPeers(); }
      else if (kind === 'chat') line('', `<b>${label(kw.peer)}</b>: ${esc(kw.text)}`);
      else if (kind === 'files') {
        if (!kw.entries.length) { line('sys', `${label(kw.peer)} shares nothing`); return; }
        line('sys', `${label(kw.peer)} shares:`);
        for (const e of kw.entries) {
          const d = document.createElement('div'); d.className = 'line';
          d.innerHTML = `&nbsp;&nbsp;${esc(e.name)} <span class="muted">${e.size} B</span> `;
          const b = document.createElement('button');
          b.textContent = 'get'; b.style.cssText = 'font-size:.7rem;padding:.05rem .4rem';
          b.onclick = () => { const p = node.peers[kw.peer]; if (p) p.requestGet(e.name); };
          d.appendChild(b); log.appendChild(d); log.scrollTop = log.scrollHeight;
        }
      }
      else if (kind === 'no-file') line('sys', `${label(kw.peer)} has no “${esc(kw.name)}”`);
      else if (kind === 'file-incoming') line('sys', `incoming file “${esc(kw.name)}” (${kw.size} B) from ${label(kw.peer)}…`);
      else if (kind === 'file-recv') {
        if (!kw.ok) { line('sys', `file “${esc(kw.name)}” FAILED hash check`); return; }
        const urlObj = URL.createObjectURL(kw.blob);
        line('file', `received “${esc(kw.name)}” (${kw.size} B) — <a href="${urlObj}" download="${esc(kw.name)}">save</a>`);
      }
    }

    $('join').onclick = async () => {
      $('join').disabled = true;
      try {
        await YAW.ready();
        ident = await YAW.Identity.load();
        const net = YAW.netHash($('net').value.trim());
        node = new YAW.Node($('url').value.trim(), ident, net, onEvent);
        refreshMe(); refreshKeys();
        line('sys', `joining network “${esc($('net').value.trim())}”…`);
        await node.start();
        line('sys', 'connected to signaling — waiting for peers (open this page elsewhere or run the CLI peer).');
        setInterval(refreshPeers, 1500);
      } catch (e) { line('sys', 'error: ' + esc(e.message)); $('join').disabled = false; }
    };

    $('composer').onsubmit = (e) => {
      e.preventDefault();
      const t = $('msg').value.trim(); if (!t || !node) return;
      $('msg').value = '';
      for (const p of Object.values(node.peers)) p.sendChat(t);
      line('mine', `<b>you</b>: ${esc(t)}`);
    };

    $('accept').onclick = async () => {
      if (!node) { line('sys', 'connect first'); return; }
      try {
        const card = YAW.parseCard($('acceptid').value);
        const nn = $('acceptnick').value.trim() || card.nick;
        const added = await node.accept(card.id, nn);
        $('acceptid').value = ''; $('acceptnick').value = ''; refreshKeys();
        const who = node.keyring.name(card.id) || short(card.id);
        line('sys', added ? `accepted ${who} — will connect if present` : `${who} updated`);
      } catch (e) { line('sys', 'error: ' + esc(e.message)); }
    };
    $('setnick').onclick = () => {
      const v = $('nick').value.trim();
      if (node) node.setNick(v); else localStorage.setItem('yaw2_nick', YAW.cleanNick(v));
      refreshMe();
      line('sys', 'nickname set: ' + (myNick() || '(none)'));
    };

    $('diag').onclick = async () => {
      line('sys', 'testing connectivity…');
      try {
        const c = await YAW.diagnose();
        const srflx = [...new Set(c.srflx)];
        if (srflx.length) line('sys', `✓ STUN works — your public address is ${esc(srflx[0])}. You should be reachable on most networks; if a specific peer still can't connect, one side is likely behind symmetric NAT/CGNAT — try another network.`);
        else line('sys', '✗ no reflexive candidate — STUN is blocked or this network won\'t allow direct peer connections. Try another network (there is no relay fallback by design).');
      } catch (e) { line('sys', 'connectivity test failed: ' + esc(e.message)); }
    };

    $('expcontacts').onclick = () => {
      if (!node) { line('sys', 'connect first'); return; }
      const data = node.keyring.exportContacts();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));
      a.download = 'yaw-contacts.yawcontacts';
      a.click();
      line('sys', `exported ${data.contacts.length} contact(s)`);
    };
    $('impcontacts').onclick = () => $('contactsfile').click();
    $('contactsfile').onchange = async () => {
      const f = $('contactsfile').files[0]; if (!f || !node) return;
      try { const n = node.keyring.importContacts(JSON.parse(await f.text())); refreshKeys();
        line('sys', `imported ${n} contact(s) — present ones will connect shortly`); }
      catch (e) { line('sys', 'import failed: ' + esc(e.message)); }
      $('contactsfile').value = '';
    };

    $('backupkey').onclick = async () => {
      if (!ident) return;
      const pass = await askText('Choose a passphrase to encrypt your key backup:', { password: true });
      if (!pass) return;
      const backup = ident.exportBackup(pass);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' }));
      a.download = 'yaw-identity-' + ident.id.slice(0, 8) + '.yawkey';
      a.click();
      line('sys', 'key backup downloaded — store it safely; it restores this identity anywhere.');
    };
    $('restorekey').onclick = () => $('keyfile').click();
    $('keyfile').onchange = async () => {
      const f = $('keyfile').files[0]; if (!f) return;
      const pass = await askText('Passphrase for this key backup:', { password: true });
      if (!pass) { $('keyfile').value = ''; return; }
      try {
        await YAW.ready();
        ident = await YAW.Identity.importBackup(JSON.parse(await f.text()), pass);
        refreshMe();
        line('sys', `identity restored: ${ident.short} — ${node ? 'reconnect' : 'connect'} to use it.`);
      } catch (e) { line('sys', 'restore failed (wrong passphrase or bad file): ' + esc(e.message)); }
      $('keyfile').value = '';
    };

    $('addshare').onclick = () => {
      if (!node || !$('file').files.length) return;
      for (const f of $('file').files) node.shared.set(f.name, f);
      $('sharecount').textContent = node.shared.size
        ? `sharing ${node.shared.size} file(s) — peers can browse you`
        : '';
      line('sys', `added ${$('file').files.length} file(s) to your share`);
    };

    $('sendfile').onclick = async () => {
      if (!node) return;
      for (const f of $('file').files) {
        for (const p of Object.values(node.peers)) await p.sendFile(f);
        line('file', `sending “${esc(f.name)}” (${f.size} B) to ${Object.keys(node.peers).length} peer(s)…`);
      }
    };

    // Load identity on page open so the card + backup work before connecting.
    (async () => {
      try {
        await YAW.ready();
        ident = await YAW.Identity.load();
        refreshMe();
        if (YAW.inTauri) line('sys', '🔐 desktop app — your key is stored in the OS keychain.');
      } catch (e) { /* sodium not ready yet; join() will load it */ }
    })();
  </script>
</body>
</html>
