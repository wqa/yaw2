<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>fnlr</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #0e1014; color: #d8dce2;
      font: 15px/1.6 ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    .card { text-align: center; padding: 2rem; max-width: 30rem; }
    .mark {
      font-size: 2.6rem; font-weight: 700; letter-spacing: .04em;
      color: #f2f4f8; margin: 0 0 .25rem;
    }
    .mark .dot { color: #4a9d6f; }
    .tag { color: #8b94a3; margin: 0 0 1.6rem; font-size: .95rem; }
    .status {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .82rem; color: #9aa3b2;
      border: 1px solid #262b33; border-radius: 999px; padding: .3rem .8rem;
    }
    .pulse {
      width: .55rem; height: .55rem; border-radius: 50%; background: #4a9d6f;
      box-shadow: 0 0 0 0 rgba(74,157,111,.6); animation: p 2.4s infinite;
    }
    @keyframes p {
      0% { box-shadow: 0 0 0 0 rgba(74,157,111,.5); }
      70% { box-shadow: 0 0 0 .5rem rgba(74,157,111,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,157,111,0); }
    }
    .foot { margin-top: 2rem; font-size: .76rem; color: #565e6b; }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="mark">fnlr<span class="dot">.</span></h1>
    <p class="tag">Infrastructure &amp; automation.</p>
    <span class="status"><span class="pulse"></span> All systems operational</span>
    <p class="foot">&copy; 2026 fnlr</p>
  </main>
</body>
</html>
